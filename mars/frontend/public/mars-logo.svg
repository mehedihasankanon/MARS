<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 450" fill="none">
  <defs>
    <radialGradient id="marsGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FF8A50"/>
      <stop offset="40%" stop-color="#E85D26"/>
      <stop offset="100%" stop-color="#A0380F"/>
    </radialGradient>
    <radialGradient id="craterGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C44A1A" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#C44A1A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E85D26"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E85D26" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#E85D26" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="planetShadow">
      <feDropShadow dx="0" dy="0" stdDeviation="15" flood-color="#E85D26" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="450" fill="#0A0A0A" rx="20"/>
  
  <!-- Shopping Cart Body -->
  <g transform="translate(200, 180)" filter="url(#planetShadow)">
    <!-- Cart basket -->
    <path d="M-70 55 L-80 45 L80 45 L70 80 L-60 80 Z" fill="none" stroke="url(#ringGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    <!-- Cart handle -->
    <path d="M-80 45 L-95 25" fill="none" stroke="url(#ringGrad)" stroke-width="4" stroke-linecap="round"/>
    <!-- Cart wheels -->
    <circle cx="-45" cy="90" r="7" fill="#F59E0B" filter="url(#glow)"/>
    <circle cx="55" cy="90" r="7" fill="#F59E0B" filter="url(#glow)"/>
    
    <!-- Mars Planet (sitting in cart) -->
    <circle cx="0" cy="0" r="60" fill="url(#marsGrad)"/>
    
    <!-- Planet surface craters -->
    <circle cx="-20" cy="-15" r="12" fill="url(#craterGrad)"/>
    <circle cx="25" cy="-25" r="8" fill="url(#craterGrad)"/>
    <circle cx="10" cy="20" r="15" fill="url(#craterGrad)"/>
    <circle cx="-30" cy="15" r="6" fill="url(#craterGrad)"/>
    
    <!-- Orbit Ring -->
    <ellipse cx="0" cy="0" rx="90" ry="22" fill="none" stroke="url(#ringGrad)" stroke-width="3.5" transform="rotate(-20)" opacity="0.8"/>
  </g>
  
  <!-- MARS Text -->
  <text x="200" y="340" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="bold" fill="url(#textGrad)" letter-spacing="12">MARS</text>
  
  <!-- Subtitle -->
  <text x="200" y="375" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#E85D26" letter-spacing="2" opacity="0.8">
    <tspan>— </tspan>Marketplace and Retailing System<tspan> —</tspan>
  </text>
  
  <!-- Decorative line under subtitle -->
  <line x1="100" y1="390" x2="300" y2="390" stroke="#E85D26" stroke-width="1" opacity="0.3"/>
</svg>
